<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Haqeem Umroh</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .haqeem-logo {
            width: 170px;
        }
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .container {
            display: flex;
            align-items: center;
            gap: 80px;
        }

        .semua-tombol {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .hero {
            height: 100vh;
            background: url("https://wallpapers.com/images/hd/kaaba-cloudy-sky-s6vygj1p67sfwdzc.jpg") center no-repeat;
            display: flex;
            justify-content: center;
            text-align: center;
            color: white;
           
        }

        .hero h1 {
            font-size: 50px;
            margin-bottom: 20px;
            color: black;
            margin-top: 100px;
        }

        .hero p {
            font-size: 20px;
            margin-bottom: 20px;
            color: black;
            font-family: Arial, Helvetica, sans-serif;
            justify-content: center;
            text-align: center;
        }

        .paket-umroh {
             color: black;
             background: none;
             border: none;
             font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
             cursor: pointer;
             transition: 0.15s;
        }

        .paket-umroh:hover {
             opacity: 0.5;
             
        }

        .paket-umroh:active {
             opacity: 0.8;
        }

        .tentang-kami {
             color: black;
             background: none;
             border: none;
             font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
             cursor: pointer;
             transition: 0.15s;
        }

        .tentang-kami:hover {
             opacity: 0.5;
             
        }

        .tentang-kami:active {
             opacity: 0.8;
        }

        .testimoni {
             color: black;
             background: none;
             border: none;
             font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
             cursor: pointer;
             transition: 0.15s;
        }

        .testimoni:hover {
             opacity: 0.5;
             
        }

        .testimoni:active {
             opacity: 0.8;
        }

        .artikel-edukasi {
             color: black;
             background: none;
             border: none;
             font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
             cursor: pointer;
             transition: 0.15s;
        }

        .artikel-edukasi:hover {
             opacity: 0.5;
             
        }

        .artikel-edukasi:active {
             opacity: 0.8;
        }

        .hubungi-kami {
             color: black;
             background-color: goldenrod;
             border: black;
             border-radius: 20px;
             border-style: solid;
             padding-left: 5px;
             padding-right: 5px;
             padding-bottom: 5px;
             padding-top: 5px;
             font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
             cursor: pointer;
             transition: 0.15s;
        }

        .hubungi-kami:hover {
             opacity: 0.5;
            
        }

        .hubungi-kami:active {
             opacity: 0.8;
        }

        .jadwal-harga {
            cursor: pointer;
            background-color:gold;
            border-color: rgb(0, 0, 0);
            font-weight: bold;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            padding-left: 5px;
            padding-right: 5px;
            padding-bottom: 5px;
            padding-top: 5px;
            border-style: solid;
            border-radius: 20px;
        }

        .jadwal-harga:hover {
             opacity: 0.5;
            
        }

        .jadwal-harga:active {
            opacity: 0.8;
        }
        
        .menu-icon {
            display: none;
            font-size: 30px;
            cursor: pointer;
        }

        #menu-toggle {
            display: none;
        }

        @media (max-width:768px) {

            .semua-tombol{
                display: none;
                flex-direction: column;
            }

            #menu-toggle:checked ~ .semua-tombol {
                display: flex;
            }

            .menu-icon {
                display: block;
            }
        }
    </style>
</head>

<body>
    
    <div class="container">

      <img src="https://tse2.mm.bing.net/th/id/OIP.b0vbIm6NuIPcIRkR2IR9fAHaDP?pid=Api&P=0&h=180" class="haqeem-logo">
      
      <input type="checkbox" id="menu-toggle">
      <label for="menu-toggle" class="menu-icon">=</label>
      
      <div class="semua-tombol">
            <a href="https://haqeemtravel.co.id/#pakethaji&umroh">
                <button class="paket-umroh">
                    Paket Umrah
                </button>
            </a>
        
            <a href="https://haqeemtravel.co.id/#profil">
                <button class="tentang-kami">
                    Tentang Kami
                </button>
            </a>
       
            <a href="https://haqeemtravel.co.id/#testimoni">
                <button class="testimoni">
                    Testimoni
                </button>
            </a>
        
            <a href="https://haqeemtravel.co.id/#blog">
                <button class="artikel-edukasi">
                    Artikel Edukasi
                </button>
            </a>

            <a href="https://wa.me/6281298299320">
                <button class="hubungi-kami">
                    Hubungi Kami
                </button>
            </a>
      </div>
            
     </div>

        
    <section class="hero">
        <div>
            <h1>Paket Umroh Ramadhan 2026</h1>
            <p>Ibadah Khusyuk di Bulan Suci</p>
            <a href="https://haqeemtravel.co.id/#pakethaji&umroh">
                <button class="jadwal-harga">
                    Jadwal & Harga
                </button>
            </a>
        </div>
    </section>
</body>
</html>
