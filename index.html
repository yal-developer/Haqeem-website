<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Haqeem Umroh</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .hero {
            height: 100px;
            background: url("https://niaz.files.wordpress.com/2010/01/bait-o-allah-makkah-kabah-1.jpg") center no-repeat;
            display: flex;
            justify-content: center;
            text-align: center;
            color: white;
        }

        .hero h1 {
            font-size: 50px;
            margin-bottom: 20px;
        }

        .hero p {
            font-size: 20px;
            margin-bottom: 20px;
        }

        .hero button {
            padding: 12px 25px;
            background: gold;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <section class="hero">
        <div class="overlay"></div>
        <div class="hero-content">
            <h1>Paket Umroh Ramadhan 2026</h1>
            <p>Ibadah Khusyuk di Bulan Suci</p>
            <button>Cek Jadwal & Harga</button>
        </div>
    </section>
</body>
</html>
