<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Haqeem Umroh</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .hero {
            height: 100vh;
            background: url("https://upload.wikimedia.org/wikipedia/commons/thumb/a/a8/The_Kabah_in_the_Grand_Mosque_of_Makkah%2C_Saudi_Arabia_(52501405646).jpg/1200px-The_Kabah_in_the_Grand_Mosque_of_Makkah%2C_Saudi_Arabia_(52501405646).jpg") center no-repeat;
            display: flex;
            justify-content: center;
            text-align: center;
            color: white;
        }

        .hero h1 {
            font-size: 50px;
            margin-bottom: 20px;
        }

        .hero p {
            font-size: 20px;
            margin-bottom: 20px;
        }

        .hero button {
            padding: 12px 25px;
            background: gold;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <section class="hero">
        <div>
            <h1>Paket Umroh Ramadhan 2026</h1>
            <p>Ibadah Khusyuk di Bulan Suci</p>
            <button>Cek Jadwal & Harga</button>
        </div>
    </section>
</body>
</html>
